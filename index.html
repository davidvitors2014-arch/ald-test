<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>David Santos AI</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #00ff41;
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #matrix-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      opacity: 0.07;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
      pointer-events: none;
      z-index: 1;
    }

    .hub {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem 1.5rem;
      max-width: 480px;
      width: 100%;
    }

    .prompt-line {
      font-size: 0.8rem;
      color: #00cc33;
      margin-bottom: 0.6rem;
    }

    h1 {
      font-size: clamp(2rem, 8vw, 3rem);
      letter-spacing: 4px;
      text-shadow: 0 0 20px #00ff41, 0 0 40px #00cc33;
      animation: flicker 6s infinite;
      margin-bottom: 0.6rem;
    }

    .tagline {
      font-size: 0.85rem;
      color: #00cc33;
      letter-spacing: 2px;
      margin-bottom: 3rem;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      height: 1em;
      background: #00ff41;
      margin-left: 4px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .btn {
      display: block;
      padding: 1.1rem 1.5rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: 1rem;
      letter-spacing: 2px;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
    }

    .btn-primary {
      background: #00ff41;
      color: #000;
      font-weight: bold;
    }

    .btn-primary:hover {
      box-shadow: 0 0 30px rgba(0,255,65,0.6);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: transparent;
      color: #00ff41;
      border: 1px solid #00ff41;
    }

    .btn-secondary:hover {
      background: rgba(0,255,65,0.08);
      box-shadow: 0 0 20px rgba(0,255,65,0.2);
      transform: translateY(-2px);
    }

    @keyframes blink { 50% { opacity: 0; } }
    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96% { opacity: 0.7; }
      98% { opacity: 0.5; }
      99% { opacity: 1; }
    }
  </style>
</head>
<body>

  <canvas id="matrix-canvas"></canvas>

  <div class="hub">
    <div class="prompt-line">root@davidsantos-ai:~$</div>
    <h1>DAVID SANTOS<span class="cursor"></span></h1>
    <div class="tagline">// IA que cria. Conteúdo que vende.</div>

    <div class="buttons">
      <a class="btn btn-primary" href="/skill.html">&gt; GERADOR DE CARROSSEL AUTOMATICO_</a>
      <a class="btn btn-secondary" href="/prompts.html">&gt; PROMPTS DE IMAGEM E VIDEO_</a>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()アイウエオカキク';
    const fontSize = 14;
    const cols = Math.floor(canvas.width / fontSize);
    const drops = Array(cols).fill(1);
    function draw() {
      ctx.fillStyle = 'rgba(0,0,0,0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#00ff41';
      ctx.font = fontSize + 'px monospace';
      drops.forEach((y, i) => {
        ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * fontSize, y * fontSize);
        if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      });
    }
    setInterval(draw, 50);
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
  </script>
</body>
</html>
